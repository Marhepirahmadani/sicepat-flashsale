services:
  nginx:
    image: nginx:alpine
    container_name: sicepat-lb
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-checkout
      - backend-katalog
      - backend-cart
    networks:
      - sicepat-network

  backend-checkout:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: sicepat-checkout
    command: python /app/backend_checkout.py
    networks:
      - sicepat-network

  backend-katalog:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: sicepat-katalog
    command: python /app/backend_katalog.py
    networks:
      - sicepat-network

  backend-cart:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: sicepat-cart
    command: python /app/backend_cart.py
    networks:
      - sicepat-network

networks:
  sicepat-network:
    driver: bridge
